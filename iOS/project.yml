name: Ticket Stub
options:
  bundleIdPrefix: com.shimondeitel.ticketstub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ticket Stub:
    type: application
    platform: iOS
    sources:
      - path: Ticket Stub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticketstub
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ticket Stub/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Ticket StubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Ticket StubTests
      - path: Ticket Stub.storekit
    dependencies:
      - target: Ticket Stub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticketstub.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Ticket StubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Ticket StubUITests
    dependencies:
      - target: Ticket Stub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ticketstub.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ticket Stub:
    build:
      targets:
        Ticket Stub: all
        Ticket StubTests: [test]
        Ticket StubUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Ticket Stub.storekit
    test:
      config: Debug
      storeKitConfiguration: Ticket Stub.storekit
      targets:
        - Ticket StubTests
        - Ticket StubUITests
    archive:
      config: Release
